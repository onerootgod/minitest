name: TCM.OS Omni-Audit & Persistence
on:
  repository_dispatch:
    types: [trigger-audit]
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  integrated-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout minitest
        uses: actions/checkout@v4
        with:
          path: minitest
          token: ${{ secrets.GH_PAT }}

      - name: Checkout zymini
        uses: actions/checkout@v4
        with:
          repository: onerootgod/zymini
          path: zymini
          token: ${{ secrets.GH_PAT }}

      - name: Checkout zyadmin
        uses: actions/checkout@v4
        with:
          repository: onerootgod/zyadmin
          path: zyadmin
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install miniprogram-ci
        run: npm install -g miniprogram-ci

      - name: Mini-App Upload & Preview
        run: |
          cd zymini
          echo "${{ secrets.WECHAT_MINIPROGRAM_KEY }}" > private.key
          miniprogram-ci upload \
            --appid ${{ secrets.WECHAT_MINIPROGRAM_APPID }} \
            --key-path private.key \
            --version 1.0.0-audit \
            --desc "GHA Automated Audit Preview" \
            --project-path . \
            --qrcode-format image \
            --qrcode-output-path ../minitest/audit-results/mini/preview_qrcode.jpg
        continue-on-error: true

      - name: Admin & Mini-Web Audit (Playwright)
        run: |
          cd minitest
          npm install
          npx playwright install --with-deps
          npx playwright test tests/admin-check.spec.ts
        env:
          TEST_URL: 'https://zyadmin.pages.dev'

      - name: Persist Audit Results
        if: always()
        run: |
          cd minitest
          git config --global user.name "Heimerdinger (Nexus Bot)"
          git config --global user.email "heimerdinger@nexus.one"
          git add audit-results/
          git commit -m "📸 AUDIT: 自动生成多端适配审计快照 & 预览码 [$(date +'%Y-%m-%d %H:%M')]" || echo "No changes to commit"
          git push origin main

      - name: Notify War Room
        if: always()
        run: |
          STATUS="${{ job.status }}"
          if [ "$STATUS" == "success" ]; then
            EMOJI="✅"
          else
            EMOJI="❌"
          fi
          # 构建消息
          MSG="$EMOJI 审计流水线运行结束：$STATUS。请查收最新的 ISSUE_LOG 和截图。"
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="$MSG"

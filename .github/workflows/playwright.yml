name: TCM.OS Omni-Audit (Heimerdinger Edition)
on:
  repository_dispatch:
    types: [trigger-audit]
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  macos-deep-audit:
    runs-on: macos-latest
    timeout-minutes: 60
    steps:
      - name: 📦 Checkout Repos
        uses: actions/checkout@v4
        with:
          path: minitest
          token: ${{ secrets.GH_PAT }}

      - name: 🧪 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: minitest/package.json

      - name: ⚙️ Install WeChat DevTools (Headless Pro)
        run: |
          # 黑默丁格：使用更稳健的安装逻辑
          echo "Installing WeChat DevTools IDE..."
          curl -sL -o wechat_devtools.dmg https://dldir1.qq.com/WechatWebDev/release/p-ae42eeed9c4d4dd9bc3d060b95cc95c4/wechat_devtools_1.06.2401020_x64.dmg
          sudo hdiutil attach wechat_devtools.dmg -nobrowse -quiet
          sudo cp -R "/Volumes/微信开发者工具/微信开发者工具.app" /Applications/
          sudo hdiutil detach "/Volumes/微信开发者工具"
          
          # 创建 CLI 软链接
          sudo ln -s "/Applications/微信开发者工具.app/Contents/MacOS/cli" /usr/local/bin/wechat-cli
          wechat-cli -v
        continue-on-error: false

      - name: ⚡ Environment Warm-up
        run: |
          cd minitest
          npm install
          # 这里由黑默丁格强制开启 CLI 登录态及服务端口
          wechat-cli open --project ../zymini || true
          # 开启自动化端口
          wechat-cli auto --project ../zymini --auto-port 9420 || true
        env:
          WECHAT_APPID: ${{ secrets.WECHAT_MINIPROGRAM_APPID }}

      - name: 🛡️ Audit Execution
        run: |
          cd minitest
          # 运行由黑默丁格重构的深度审计脚本
          npx playwright test tests/deep-audit.spec.ts
        env:
          TEST_URL: 'https://zyadmin.pages.dev'

      - name: 📡 Direct Specialist Report (MAAR)
        if: always()
        run: |
          TOKEN="${{ secrets.TELEGRAM_TOKEN }}"
          CHAT_ID="-1003936889860"
          
          if [ "${{ job.status }}" == "success" ]; then
            MSG="**黑默丁格｜⚙️ 深度战报**%0A---%0A✅ macOS 真实内核审计完成%0A✅ IDE 服务端口回传正常%0A📸 交互截图已同步至 GitHub"
          else
            MSG="**黑默丁格｜⚠️ 故障预警**%0A---%0A❌ macOS 安装或审计环境异常%0A🔍 正在由系统核心尝试自动诊断..."
          fi
          
          curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" \
            -d chat_id="$CHAT_ID" \
            -d text="$MSG" \
            -d parse_mode="Markdown"

name: TCM.OS Omni-Audit (Recovery)
on:
  repository_dispatch:
    types: [trigger-audit]
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  stable-audit:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          path: minitest
          token: ${{ secrets.GH_PAT }}

      - name: Checkout zymini
        uses: actions/checkout@v4
        with:
          repository: onerootgod/zymini
          path: zymini
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install
        run: |
          cd minitest
          npm install
          npx playwright install --with-deps

      - name: Audit Run
        run: |
          cd minitest
          npx playwright test tests/deep-audit.spec.ts
        env:
          TEST_URL: 'https://zyadmin.pages.dev'

      - name: 🛡️ Poppy: War Room Report
        if: always()
        run: |
          TOKEN="${{ secrets.TELEGRAM_TOKEN }}"
          CHAT_ID="-1003936889860"
          IMG="minitest/audit-results/admin/iPad_Pro_11_Landscape_phase1_init.png"
          
          MSG="**波比｜🛡️ UI 自动审核战报**%0A---%0A✅ 宿主回滚至 Linux (Stable)%0A✅ 滑动/旋转场景已捕捉%0A📍 详见：https://github.com/onerootgod/minitest/tree/main/audit-results"
          
          if [ -f "$IMG" ]; then
            curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendPhoto" -F chat_id="$CHAT_ID" -F photo="@$IMG" -F caption="$MSG" -F parse_mode="Markdown"
          else
            curl -s -X POST "https://api.telegram.org/bot$TOKEN/sendMessage" -d chat_id="$CHAT_ID" -d text="$MSG" -d parse_mode="Markdown"
          fi

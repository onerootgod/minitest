name: Playwright Tests
on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps
    - name: Run Playwright tests
      run: npx playwright test
    - name: Report Results to Telegram
      if: always()
      run: |
        RESULT="Success ✅"
        if [ "${{ job.status }}" != "success" ]; then
          RESULT="Failed ❌"
        fi
        
        REPORT_NAME="GHA Subagent: 黑默丁格｜🛠️"
        REPO_NAME="${{ github.repository }}"
        WORKFLOW_URL="${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
        
        MESSAGE="<b>【GHA 自动化战报】</b>%0A"
        MESSAGE+="汇报专员: ${REPORT_NAME}%0A"
        MESSAGE+="项目仓库: ${REPO_NAME}%0A"
        MESSAGE+="测试状态: ${RESULT}%0A"
        MESSAGE+="查看详情: <a href='${WORKFLOW_URL}'>GitHub Actions 链接</a>"
        
        curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_TOKEN }}/sendMessage" \
          -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
          -d text="${MESSAGE}" \
          -d parse_mode="HTML"
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30

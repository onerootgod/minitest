name: TCM.OS Omni-Audit & Persistence
on:
  repository_dispatch:
    types: [trigger-audit]
  workflow_dispatch:
  push:
    branches: [ main, master ]

jobs:
  integrated-audit:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout minitest
        uses: actions/checkout@v4
        with:
          path: minitest
          token: ${{ secrets.GH_PAT }}

      - name: Checkout zymini
        uses: actions/checkout@v4
        with:
          repository: onerootgod/zymini
          path: zymini
          token: ${{ secrets.GH_PAT }}

      - name: Checkout zyadmin
        uses: actions/checkout@v4
        with:
          repository: onerootgod/zyadmin
          path: zyadmin
          token: ${{ secrets.GH_PAT }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Create Audit Folders
        run: |
          mkdir -p minitest/audit-results/admin
          mkdir -p minitest/audit-results/mini

      - name: Install & Run Admin Audit
        id: admin_audit
        run: |
          cd minitest
          npm install
          npx playwright install --with-deps
          npx playwright test tests/admin-check.spec.ts
        env:
          TEST_URL: 'https://zyadmin.pages.dev'

      - name: Persist Audit Results to Repository
        if: always()
        run: |
          cd minitest
          git config --global user.name "Heimerdinger (Nexus Bot)"
          git config --global user.email "heimerdinger@nexus.one"
          git add audit-results/
          git commit -m "📸 AUDIT: 自动生成多端适配审计快照 [$(date +'%Y-%m-%d %H:%M')]" || echo "No changes to commit"
          git push origin main

      - name: Notify War Room (Success)
        if: success()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="✅ 审计完成：GHA 已成功捕获全端适配快照并推送至 minitest 仓库。请 @poppy 进行视觉核对。"

      - name: Notify War Room (Failure)
        if: failure()
        run: |
          curl -s -X POST "https://api.telegram.org/bot${{ secrets.TELEGRAM_BOT_TOKEN }}/sendMessage" \
            -d chat_id="${{ secrets.TELEGRAM_CHAT_ID }}" \
            -d text="❌ 审计中断：GHA 执行失败。@heimerdinger 请检查 Playwright 运行日志和依赖环境。"
